name: Metrics
on:
  # Обновление каждый день в полночь
  schedule: [{cron: "0 0 * * *"}]
  # Возможность ручного запуска
  workflow_dispatch:
  # Запуск при пуше в main
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          # Используем стандартный GITHUB_TOKEN (для публичной статистики этого достаточно)
          token: ${{ secrets.GITHUB_TOKEN }}
          
          # Основные настройки
          user: Gi99lin
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/Moscow
          
          # Плагин языков программирования
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_details: percentage
          plugin_languages_limit: 8
          
          # Плагин строк кода (добавлено/удалено)
          plugin_lines: yes
