name: Metrics
on:
  # Обновление каждый день в полночь
  schedule: [{cron: "0 0 * * *"}]
  # Возможность ручного запуска
  workflow_dispatch:
  # Запуск при пуше в main
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          # Используем стандартный GITHUB_TOKEN
          token: ${{ secrets.GITHUB_TOKEN }}
          
          # Основные настройки
          user: Gi99lin
          template: classic
          # Оставляем только шапку и активность, убираем блоки с нулями (community, repositories)
          base: header, activity
          config_timezone: Europe/Moscow
          
          # Плагин языков программирования
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_details: percentage
          plugin_languages_limit: 8
          
          # Плагин привычек кодинга (показывает часы активности и дни недели)
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_charts: yes
          plugin_habits_trim: yes
