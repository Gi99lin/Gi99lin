name: Metrics
on:
  # Обновление каждый день в полночь
  schedule: [{cron: "0 0 * * *"}]
  # Возможность ручного запуска
  workflow_dispatch:
  # Запуск при пуше в main
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          # Используем стандартный GITHUB_TOKEN
          token: ${{ secrets.GITHUB_TOKEN }}
          
          # Указываем новое имя файла, чтобы обойти жесткое кэширование GitHub (Camo)
          filename: profile-metrics.svg
          
          # Основные настройки
          user: Gi99lin
          template: classic
          # Оставляем только шапку и активность, убираем блоки с нулями
          base: header, activity
          config_timezone: Europe/Moscow
          
          # Плагин языков программирования
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_details: percentage
          plugin_languages_limit: 8
          
          # 3D календарь активности
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
